version: 2
updates:
  # Update used workflows
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: daily

  # Update Cargo deps
  - package-ecosystem: cargo
    directory: "/"
    cooldown:
      default-days: 7
    schedule:
      interval: "weekly"

  # Update Nixpkgs & other flake inputs
  - package-ecosystem: nix
    directory: "/"
    cooldown:
      default-days: 7
    schedule:
      interval: daily
